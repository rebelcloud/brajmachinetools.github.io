<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMT | Precision Machine Tooling Catalog</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --dark: #121212; --grey: #1f1f1f; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--dark); color: var(--white); }
        
        /* Shared Navigation */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 5%; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--gold); }
        .logo-wrap { display: flex; align-items: center; text-decoration: none; color: white; }
        .bmt-logo { width: 45px; height: 45px; border: 2px solid var(--gold); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-right: 12px; color: var(--gold); font-weight: bold; }
        
        /* Search Bar for 30+ Products */
        .search-container { padding: 40px 5%; text-align: center; background: #1a1a1a; }
        #toolSearch { width: 100%; max-width: 600px; padding: 15px; border-radius: 30px; border: 1px solid var(--gold); background: #000; color: white; font-size: 16px; }

        /* Catalog Grid */
        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: var(--grey); border: 1px solid #333; border-radius: 8px; overflow: hidden; transition: 0.3s; }
        .card:hover { border-color: var(--gold); }
        .tool-img { width: 100%; height: 180px; background: #222; object-fit: cover; }
        .card-body { padding: 15px; }
        .card h3 { color: var(--gold); font-size: 1.1rem; margin: 0 0 10px 0; }

        .btn-wa { display: block; text-align: center; background: var(--gold); color: black; padding: 10px; text-decoration: none; font-weight: bold; border-radius: 4px; font-size: 13px; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo-wrap">
            <div class="bmt-logo">BMT</div>
            <div><b style="font-size: 18px;">BRAJ MACHINE TOOLS</b></div>
        </a>
        <div>
            <a href="index.html" style="color: white; text-decoration: none; font-weight: bold;">BACK TO HOME</a>
        </div>
    </nav>

    <div class="search-container">
        <h1>Machine Tooling Catalog</h1>
        <input type="text" id="toolSearch" placeholder="Search by machine model (Sisma, Fasti, Ombi)..." onkeyup="filterTools()">
    </div>

    <div class="container">
        <div class="grid" id="toolGrid">
            <div class="card" data-name="Sisma Ombi Fasti Curb Cable 0.2mm">
                <div class="tool-img" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);color:#D4AF37;font-weight:bold;font-size:14px;text-align:center;padding:20px;">
                    <div><i class="fas fa-wrench" style="font-size:40px;display:block;margin-bottom:10px;"></i>Sisma/Ombi Tool Set</div>
                </div>
                <div class="card-body">
                    <h3>Sisma/Ombi Set (0.2-0.6mm)</h3>
                    <a href="https://wa.me/919719411537" class="btn-wa">Order on WhatsApp</a>
                </div>
            </div>

            <div class="card" data-name="Fasti Box Chain FMV SFV">
                <div class="tool-img" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a1a,#2a2a2a);color:#D4AF37;font-weight:bold;font-size:14px;text-align:center;padding:20px;">
                    <div><i class="fas fa-tools" style="font-size:40px;display:block;margin-bottom:10px;"></i>Fasti Box Chain Tools</div>
                </div>
                <div class="card-body">
                    <h3>Fasti Box Chain Tools</h3>
                    <a href="https://wa.me/919719411537" class="btn-wa">Order on WhatsApp</a>
                </div>
            </div>

            </div>
    </div>

     <div style="text-align: center; padding: 20px; background: #1a1a1a; border-bottom: 1px solid #333;">
    <a href="BMT-Catalog-2026.pdf" download class="btn-pdf">
        <i class="fas fa-file-pdf"></i> DOWNLOAD FULL PRICE LIST (PDF)
    </a>
</div>

<style>
    .btn-pdf {
        display: inline-block;
        background: transparent;
        color: #D4AF37;
        border: 2px solid #D4AF37;
        padding: 12px 25px;
        text-decoration: none;
        font-weight: bold;
        border-radius: 5px;
        transition: 0.3s;
        font-size: 14px;
    }
    .btn-pdf:hover {
        background: #D4AF37;
        color: black;
    }
    .btn-pdf i { margin-right: 10px; }
</style>

    <script>
        function filterTools() {
            let input = document.getElementById('toolSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getAttribute('data-name').toLowerCase();
                cards[i].style.display = name.includes(input) ? "block" : "none";
            }
        }
    </script>
</body>
</html>
